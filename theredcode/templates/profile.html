<html>
    <head>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>

    <body>
<div class="top-actions">
    <a href="/logout"><span class="header-btn logout">Выйти</span></a>
</div>

        <div class="container">
            <h1>Профиль
<div class="profile-name">
{% if session.get('fullname') %}
    {{ session.get('fullname').split()[0] }}
{% endif %}
</div>
</h1>
            <h2>Результаты</h2>
        {% for r in results %}
        <div class="card">
            <h5>
                Задача {{ r.task_id }} — {{ r.status }}
            </h5>
        </div>
        {% endfor %}
        </div>
    </body>
</html>
